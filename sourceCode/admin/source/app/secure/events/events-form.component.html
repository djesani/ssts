<div class="form-container">
    <h2>{{isEdit ? 'Edit' : 'Add'}} Event</h2>
    <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Name</label>
            <input type="text" formControlName="name" class="form-control">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea formControlName="description" class="form-control"></textarea>
        </div>
        <div class="row">
            <div class="col">
                <label>Start Date</label>
                <input type="text" formControlName="startDate" class="form-control" placeholder="DD/MM/YYYY">
            </div>
            <div class="col">
                <label>End Date</label>
                <input type="text" formControlName="endDate" class="form-control" placeholder="DD/MM/YYYY">
            </div>
        </div>
        <div class="form-check">
            <input type="checkbox" formControlName="unpublished" id="pub">
            <label for="pub">Unpublished</label>
        </div>
        <div class="actions">
            <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
            <button type="submit" [disabled]="eventForm.invalid" class="btn btn-primary">Save</button>
        </div>
    </form>
</div>
